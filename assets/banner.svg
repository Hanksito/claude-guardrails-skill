<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-label="claude-guardrails-skill — Remember, Stay on track, Tell the truth">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#141a36"/>
      <stop offset="1" stop-color="#1f1340"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#4f8cff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#34d3a6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1280" height="360" rx="20" fill="url(#bg)"/>

  <!-- faint grid dots -->
  <g fill="#ffffff" opacity="0.04">
    <circle cx="1080" cy="60" r="3"/><circle cx="1130" cy="60" r="3"/><circle cx="1180" cy="60" r="3"/><circle cx="1230" cy="60" r="3"/>
    <circle cx="1080" cy="110" r="3"/><circle cx="1130" cy="110" r="3"/><circle cx="1180" cy="110" r="3"/><circle cx="1230" cy="110" r="3"/>
    <circle cx="1080" cy="160" r="3"/><circle cx="1130" cy="160" r="3"/><circle cx="1180" cy="160" r="3"/><circle cx="1230" cy="160" r="3"/>
  </g>

  <!-- shield emblem -->
  <g filter="url(#soft)" transform="translate(96 110)">
    <path d="M70 0 L132 24 V92 C132 134 104 162 70 176 C36 162 8 134 8 92 V24 Z" fill="url(#shield)"/>
    <path d="M70 0 L132 24 V92 C132 134 104 162 70 176 C36 162 8 134 8 92 V24 Z" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="2"/>
    <!-- check mark -->
    <path d="M44 88 L64 110 L98 60" fill="none" stroke="#ffffff" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- title + tagline -->
  <g font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <text x="276" y="138" fill="#ffffff" font-size="58" font-weight="700" letter-spacing="-1">claude-guardrails-skill</text>
    <text x="278" y="182" fill="#aab2d5" font-size="25" font-weight="400">A Claude plugin that makes your agent remember, stay on track, and tell the truth.</text>

    <!-- pills -->
    <g font-size="22" font-weight="600" text-anchor="middle">
      <rect x="278" y="214" width="200" height="52" rx="26" fill="#ffffff" fill-opacity="0.06" stroke="#7c5cff" stroke-opacity="0.6"/>
      <circle cx="312" cy="240" r="6" fill="#7c5cff"/>
      <text x="390" y="248" fill="#cdd4f5">Remember</text>

      <rect x="494" y="214" width="226" height="52" rx="26" fill="#ffffff" fill-opacity="0.06" stroke="#4f8cff" stroke-opacity="0.6"/>
      <circle cx="528" cy="240" r="6" fill="#4f8cff"/>
      <text x="613" y="248" fill="#cdd4f5">Stay on track</text>

      <rect x="736" y="214" width="208" height="52" rx="26" fill="#ffffff" fill-opacity="0.06" stroke="#34d3a6" stroke-opacity="0.6"/>
      <circle cx="770" cy="240" r="6" fill="#34d3a6"/>
      <text x="848" y="248" fill="#cdd4f5">No bluffing</text>
    </g>
  </g>

  <!-- accent bar -->
  <rect x="278" y="300" width="762" height="5" rx="2.5" fill="url(#accent)"/>
</svg>
